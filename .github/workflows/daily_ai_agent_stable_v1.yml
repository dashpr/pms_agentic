name: Daily AI Agent Stable Stocks v1

on:
  workflow_dispatch:
  schedule:
    # 19:15 IST daily run (data refresh + decision cycle)
    - cron: "45 13 * * *"
    # 22:15 IST second pass to catch delayed exchange/publication windows
    - cron: "45 16 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-ai-agent-stable-v1
  cancel-in-progress: false

jobs:
  run-daily-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas numpy requests lxml beautifulsoup4 pyyaml gdown yfinance

      - name: Prepare Folders
        run: |
          mkdir -p data data/reports data_raw/nse_bulk

      - name: Restore DB Cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: data/ownership.duckdb
          key: ownership-duckdb-${{ github.run_id }}
          restore-keys: |
            ownership-duckdb-

      - name: Download Last DB Artifact (Fallback)
        if: ${{ hashFiles('data/ownership.duckdb') == '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: daily_ai_agent_stable_v1.yml
          name: ownership-db-snapshot
          path: data
          if_no_artifact_found: warn

      - name: Validate Restored DB Seed (Drop If Invalid)
        if: ${{ hashFiles('data/ownership.duckdb') != '' }}
        run: |
          python - << 'PY'
          from pathlib import Path
          import duckdb

          db = Path("data/ownership.duckdb")
          try:
              with duckdb.connect(str(db), read_only=True) as conn:
                  conn.execute("SELECT 1").fetchone()
              print("Restored DB is valid.")
          except Exception as e:
              print("Restored DB invalid, deleting to force bootstrap. Error:", e)
              try:
                  head = db.read_bytes()[:200]
                  print("Invalid DB header preview:", head)
              except Exception:
                  pass
              db.unlink(missing_ok=True)
          PY

      - name: Bootstrap DB from Secret URL (Fallback)
        if: ${{ hashFiles('data/ownership.duckdb') == '' }}
        env:
          OWNERSHIP_DB_URL: ${{ secrets.OWNERSHIP_DB_URL }}
        run: |
          if [ -z "$OWNERSHIP_DB_URL" ]; then
            echo "OWNERSHIP_DB_URL not set; skipping bootstrap."
            exit 0
          fi
          mkdir -p /tmp/db_bootstrap
          python - << 'PY'
          import os
          import re
          import shutil
          import subprocess
          import time
          import zipfile
          from pathlib import Path

          import duckdb

          seed = Path("/tmp/db_bootstrap/seed.bin")
          out = Path("data/ownership.duckdb")
          out.parent.mkdir(parents=True, exist_ok=True)
          raw_url = os.environ["OWNERSHIP_DB_URL"].strip()

          def _extract_drive_id(url: str) -> str:
              patterns = [
                  r"/d/([a-zA-Z0-9_-]+)",
                  r"[?&]id=([a-zA-Z0-9_-]+)",
              ]
              for p in patterns:
                  m = re.search(p, url)
                  if m:
                      return m.group(1)
              return ""

          def _candidate_urls(url: str) -> list[str]:
              urls: list[str] = [url]
              fid = _extract_drive_id(url)
              if fid:
                  urls.append(f"https://drive.usercontent.google.com/download?id={fid}&export=download&confirm=t")
                  urls.append(f"https://drive.google.com/uc?export=download&id={fid}")
              # preserve order, drop duplicates
              out_u: list[str] = []
              seen: set[str] = set()
              for u in urls:
                  if u and u not in seen:
                      out_u.append(u)
                      seen.add(u)
              return out_u

          def _download(url: str) -> bool:
              seed.unlink(missing_ok=True)
              cmd = [
                  "curl",
                  "-fL",
                  "--retry", "6",
                  "--retry-all-errors",
                  "--retry-delay", "3",
                  "--connect-timeout", "20",
                  "--max-time", "600",
                  url,
                  "-o",
                  str(seed),
              ]
              p = subprocess.run(cmd, capture_output=True, text=True)
              if p.returncode != 0:
                  print("download_failed:", url, "rc=", p.returncode)
                  t = (p.stderr or p.stdout or "").strip()
                  if t:
                      print("download_error_tail:", t[-400:])
                  return False
              return seed.exists() and seed.stat().st_size > 0

          def _seed_kind(path: Path) -> str:
              if not path.exists() or path.stat().st_size == 0:
                  return "empty"
              head = path.read_bytes()[:512].lower()
              if zipfile.is_zipfile(path):
                  return "zip"
              if (b"<html" in head) or (b"<!doctype" in head):
                  return "html"
              if b"internal server error" in head:
                  return "server_error"
              try:
                  with duckdb.connect(str(path), read_only=True) as conn:
                      conn.execute("SELECT 1").fetchone()
                  return "duckdb"
              except Exception:
                  return "unknown"

          selected_kind = None
          selected_url = None
          for cand in _candidate_urls(raw_url):
              for attempt in range(1, 4):
                  print(f"bootstrap_try url={cand} attempt={attempt}")
                  ok = _download(cand)
                  kind = _seed_kind(seed) if ok else "download_failed"
                  print("seed_kind:", kind)
                  if kind in {"zip", "duckdb"}:
                      selected_kind = kind
                      selected_url = cand
                      break
                  time.sleep(2.0)
              if selected_kind is not None:
                  break

          if selected_kind is None:
              head = seed.read_bytes()[:200] if seed.exists() else b""
              raise SystemExit(
                  "Bootstrap download did not return valid .duckdb/.zip bytes. "
                  f"head={head!r}"
              )

          print("bootstrap_selected_url:", selected_url)
          print("bootstrap_selected_kind:", selected_kind)

          from pathlib import Path
          src = seed

          # Support both raw .duckdb URLs and zipped snapshots.
          if zipfile.is_zipfile(src):
              with zipfile.ZipFile(src) as zf:
                  zf.extractall("/tmp/db_bootstrap/unzipped")
              cand = list(Path("/tmp/db_bootstrap/unzipped").rglob("*.duckdb"))
              if not cand:
                  raise SystemExit("Bootstrap zip did not contain a .duckdb file")
              best = sorted(cand, key=lambda p: p.stat().st_size, reverse=True)[0]
              shutil.copy2(best, out)
          else:
              shutil.copy2(src, out)
          # Final integrity check before proceeding.
          with duckdb.connect(str(out), read_only=True) as conn:
              conn.execute("SELECT 1").fetchone()
          print(f"Bootstrap DB written: {out}")
          PY
          ls -lh data/ownership.duckdb

      - name: Verify DB Exists
        run: |
          if [ ! -f data/ownership.duckdb ]; then
            echo "Missing data/ownership.duckdb."
            echo "Set Actions secret OWNERSHIP_DB_URL to a direct downloadable .duckdb or .zip URL, then rerun."
            exit 1
          fi
          ls -lh data/ownership.duckdb

      - name: Validate DuckDB Integrity
        run: |
          python - << 'PY'
          from pathlib import Path
          import duckdb

          db = Path("data/ownership.duckdb")
          try:
              with duckdb.connect(str(db), read_only=True) as conn:
                  conn.execute("SELECT 1").fetchone()
              print("DuckDB validation: OK")
          except Exception as e:
              head = db.read_bytes()[:200]
              print("DuckDB validation failed:", e)
              print("File header preview:", head)
              raise SystemExit(
                  "Invalid ownership.duckdb in runner. "
                  "OWNERSHIP_DB_URL returned non-DB bytes (HTML/text/server error) or corrupt archive."
              )
          PY

      - name: Run Scheduled Daily Cycle
        run: |
          python src/pipeline/run_scheduled_daily_cycle_v1.py \
            --db-path data/ownership.duckdb \
            --max-repair-rounds 5 \
            --price-csv-dir data/csvs \
            --prices-stale-days 1 \
            --prices-max-symbols 0 \
            --prices-sleep-ms 100 \
            --bulk-lookback-days 180 \
            --strict-rebalance-pretrade \
            --allow-degraded-fallback \
            --out-json data/reports/scheduled_daily_cycle_v1_latest.json

      - name: Show Scheduled Cycle Report
        if: always()
        run: |
          if [ -f data/reports/scheduled_daily_cycle_v1_latest.json ]; then
            cat data/reports/scheduled_daily_cycle_v1_latest.json
          else
            echo "scheduled_daily_cycle_v1_latest.json not found"
          fi

      - name: Publish Runtime Snapshot Branch
        if: ${{ always() && hashFiles('data/ownership.duckdb') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SNAP_DIR="/tmp/runtime-data-branch"
          rm -rf "$SNAP_DIR"
          mkdir -p "$SNAP_DIR"

          cd "$SNAP_DIR"
          git init
          git checkout -b runtime-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data data/reports
          python "$GITHUB_WORKSPACE/src/pipeline/build_runtime_dashboard_db_v1.py" \
            --src-db "$GITHUB_WORKSPACE/data/ownership.duckdb" \
            --out-db "$SNAP_DIR/data/ownership_runtime.duckdb"
          ls -lh data/ownership_runtime.duckdb

          for f in \
            "$GITHUB_WORKSPACE/data/reports/scheduled_daily_cycle_v1_latest.json" \
            "$GITHUB_WORKSPACE/data/reports/ai_agent_stable_stocks_v1_latest.json" \
            "$GITHUB_WORKSPACE/data/reports/repair_required_pipelines_v1_latest.json"; do
            if [ -f "$f" ]; then
              cp "$f" data/reports/
            fi
          done

          cat > data/runtime_meta.json <<EOF
          {
            "published_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "source_sha": "${GITHUB_SHA}",
            "source_run_id": "${GITHUB_RUN_ID}"
          }
          EOF

          git add -A
          git commit -m "runtime snapshot ${GITHUB_SHA} $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin runtime-data
          echo "Runtime DB URL: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/runtime-data/data/ownership_runtime.duckdb"

      - name: Save DB Cache
        if: ${{ always() && hashFiles('data/ownership.duckdb') != '' }}
        uses: actions/cache/save@v4
        with:
          path: data/ownership.duckdb
          key: ownership-duckdb-${{ github.run_id }}

      - name: Upload Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-agent-reports
          path: |
            data/reports/*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload DB Snapshot Artifact
        if: ${{ always() && hashFiles('data/ownership.duckdb') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ownership-db-snapshot
          path: data/ownership.duckdb
          retention-days: 7
