name: Daily AI Agent Stable Stocks v1

on:
  workflow_dispatch:
  schedule:
    # 19:15 IST, Monday-Friday
    - cron: "45 13 * * 1-5"

permissions:
  contents: read
  actions: read

concurrency:
  group: daily-ai-agent-stable-v1
  cancel-in-progress: false

jobs:
  run-daily-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas numpy requests lxml beautifulsoup4 pyyaml gdown

      - name: Prepare Folders
        run: |
          mkdir -p data data/reports data_raw/nse_bulk

      - name: Restore DB Cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: data/ownership.duckdb
          key: ownership-duckdb-${{ github.run_id }}
          restore-keys: |
            ownership-duckdb-

      - name: Download Last DB Artifact (Fallback)
        if: ${{ hashFiles('data/ownership.duckdb') == '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: daily_ai_agent_stable_v1.yml
          name: ownership-db-snapshot
          path: data
          if_no_artifact_found: warn

      - name: Validate Restored DB Seed (Drop If Invalid)
        if: ${{ hashFiles('data/ownership.duckdb') != '' }}
        run: |
          python - << 'PY'
          from pathlib import Path
          import duckdb

          db = Path("data/ownership.duckdb")
          try:
              with duckdb.connect(str(db), read_only=True) as conn:
                  conn.execute("SELECT 1").fetchone()
              print("Restored DB is valid.")
          except Exception as e:
              print("Restored DB invalid, deleting to force bootstrap. Error:", e)
              try:
                  head = db.read_bytes()[:200]
                  print("Invalid DB header preview:", head)
              except Exception:
                  pass
              db.unlink(missing_ok=True)
          PY

      - name: Bootstrap DB from Secret URL (Fallback)
        if: ${{ hashFiles('data/ownership.duckdb') == '' }}
        env:
          OWNERSHIP_DB_URL: ${{ secrets.OWNERSHIP_DB_URL }}
        run: |
          if [ -z "$OWNERSHIP_DB_URL" ]; then
            echo "OWNERSHIP_DB_URL not set; skipping bootstrap."
            exit 0
          fi
          mkdir -p /tmp/db_bootstrap
          if echo "$OWNERSHIP_DB_URL" | grep -Eq "drive\\.google\\.com|drive\\.usercontent\\.google\\.com"; then
            python - << 'PY'
            import os
            import re
            import gdown
            import subprocess
            from pathlib import Path

            def _head_bytes(path: str) -> bytes:
                p = Path(path)
                if not p.exists():
                    return b""
                return p.read_bytes()[:512].lower()

            def _is_html(path: str) -> bool:
                h = _head_bytes(path)
                return (b"<html" in h) or (b"<!doctype" in h)

            def _extract_drive_id(url: str) -> str:
                patterns = [
                    r"/d/([a-zA-Z0-9_-]+)",
                    r"[?&]id=([a-zA-Z0-9_-]+)",
                ]
                for p in patterns:
                    m = re.search(p, url)
                    if m:
                        return m.group(1)
                return ""

            url = os.environ["OWNERSHIP_DB_URL"]
            out = "/tmp/db_bootstrap/seed.bin"
            ok = gdown.download(url=url, output=out, quiet=False, fuzzy=True)
            if not ok:
                raise SystemExit("gdown failed to download OWNERSHIP_DB_URL")
            # Some Drive links can still return HTML in CI. Retry with direct URL.
            if _is_html(out):
                file_id = _extract_drive_id(url)
                if file_id:
                    direct = (
                        "https://drive.usercontent.google.com/download"
                        f"?id={file_id}&export=download&confirm=t"
                    )
                    subprocess.run(["curl", "-fL", direct, "-o", out], check=True)
            if _is_html(out):
                raise SystemExit(
                    "Google Drive URL returned HTML instead of file bytes. "
                    "Set OWNERSHIP_DB_URL to a direct downloadable URL and "
                    "ensure file is shared with 'Anyone with the link'."
                )
            print("Google Drive download completed:", out)
            PY
          else
            curl -fL "$OWNERSHIP_DB_URL" -o /tmp/db_bootstrap/seed.bin
          fi
          python - << 'PY'
          from pathlib import Path
          import shutil
          import zipfile

          src = Path("/tmp/db_bootstrap/seed.bin")
          out = Path("data/ownership.duckdb")
          out.parent.mkdir(parents=True, exist_ok=True)

          # Support both raw .duckdb URLs and zipped snapshots.
          if zipfile.is_zipfile(src):
              with zipfile.ZipFile(src) as zf:
                  zf.extractall("/tmp/db_bootstrap/unzipped")
              cand = list(Path("/tmp/db_bootstrap/unzipped").rglob("*.duckdb"))
              if not cand:
                  raise SystemExit("Bootstrap zip did not contain a .duckdb file")
              best = sorted(cand, key=lambda p: p.stat().st_size, reverse=True)[0]
              shutil.copy2(best, out)
          else:
              head = src.read_bytes()[:512].lower()
              if b"<html" in head or b"<!doctype" in head:
                  raise SystemExit(
                      "Bootstrap URL returned HTML, not a DB file. "
                      "Use a direct download URL to .duckdb or .zip."
                  )
              shutil.copy2(src, out)
          print(f"Bootstrap DB written: {out}")
          PY
          ls -lh data/ownership.duckdb

      - name: Verify DB Exists
        run: |
          if [ ! -f data/ownership.duckdb ]; then
            echo "Missing data/ownership.duckdb."
            echo "Set Actions secret OWNERSHIP_DB_URL to a direct downloadable .duckdb or .zip URL, then rerun."
            exit 1
          fi
          ls -lh data/ownership.duckdb

      - name: Validate DuckDB Integrity
        run: |
          python - << 'PY'
          from pathlib import Path
          import duckdb

          db = Path("data/ownership.duckdb")
          try:
              with duckdb.connect(str(db), read_only=True) as conn:
                  conn.execute("SELECT 1").fetchone()
              print("DuckDB validation: OK")
          except Exception as e:
              head = db.read_bytes()[:200]
              print("DuckDB validation failed:", e)
              print("File header preview:", head)
              raise SystemExit(
                  "Invalid ownership.duckdb in runner. "
                  "OWNERSHIP_DB_URL likely points to HTML/preview URL, not direct file."
              )
          PY

      - name: Run Scheduled Daily Cycle
        run: |
          python src/pipeline/run_scheduled_daily_cycle_v1.py \
            --db-path data/ownership.duckdb \
            --max-repair-rounds 5 \
            --bulk-lookback-days 180 \
            --strict-rebalance-pretrade \
            --allow-degraded-fallback \
            --out-json data/reports/scheduled_daily_cycle_v1_latest.json

      - name: Show Scheduled Cycle Report
        if: always()
        run: |
          if [ -f data/reports/scheduled_daily_cycle_v1_latest.json ]; then
            cat data/reports/scheduled_daily_cycle_v1_latest.json
          else
            echo "scheduled_daily_cycle_v1_latest.json not found"
          fi

      - name: Save DB Cache
        if: ${{ always() && hashFiles('data/ownership.duckdb') != '' }}
        uses: actions/cache/save@v4
        with:
          path: data/ownership.duckdb
          key: ownership-duckdb-${{ github.run_id }}

      - name: Upload Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-agent-reports
          path: |
            data/reports/*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload DB Snapshot Artifact
        if: ${{ always() && hashFiles('data/ownership.duckdb') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ownership-db-snapshot
          path: data/ownership.duckdb
          retention-days: 7
